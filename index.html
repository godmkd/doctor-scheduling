<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>醫師值班排班系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f1f5f9;--card:#fff;--border:#e2e8f0;--text:#1e293b;--text2:#64748b;
  --primary:#3b82f6;--primary-light:#dbeafe;
  --holiday:#f59e0b;--holiday-light:#fef3c7;
  --off:#ef4444;--off-light:#fee2e2;
  --danger:#ef4444;--success:#10b981;
  --shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --radius:8px;
}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none;font-size:inherit}
input,select{font-family:inherit;font-size:inherit}

header{background:linear-gradient(135deg,#1e40af,#7c3aed);color:#fff;padding:16px 24px;box-shadow:var(--shadow)}
header h1{font-size:1.3rem;font-weight:700;margin-bottom:8px}
.header-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:.85rem}
.header-row label{display:flex;align-items:center;gap:4px}
.header-row input[type="date"]{padding:5px 8px;border-radius:6px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);color:#fff;font-size:.85rem}
.header-row input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(1)}
.header-stat{background:rgba(255,255,255,.15);padding:4px 12px;border-radius:6px;font-weight:600}
.header-row input[type="checkbox"]{width:16px;height:16px}
.btn{padding:8px 16px;border-radius:6px;font-weight:500;font-size:.85rem;transition:all .15s}
.btn-white{background:#fff;color:#1e40af}.btn-white:hover{background:#e0e7ff}
.btn-danger{background:rgba(239,68,68,.2);color:#fecaca}.btn-danger:hover{background:rgba(239,68,68,.4)}
.btn-sm{padding:4px 10px;font-size:.8rem}
.btn-outline{border:1px solid var(--border);background:var(--card);color:var(--text)}.btn-outline:hover{background:var(--bg)}

.content{display:flex;gap:0;min-height:calc(100vh - 120px)}
aside{width:320px;min-width:320px;background:var(--card);border-right:1px solid var(--border);overflow-y:auto;max-height:calc(100vh - 120px);padding:16px}
aside h2{font-size:1rem;font-weight:700;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.doc-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:8px}
.doc-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.doc-row input[type="text"]{flex:1;padding:4px 8px;border:1px solid var(--border);border-radius:4px;font-size:.85rem;background:#fff}
.doc-row input[type="number"]{width:50px;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:.85rem;background:#fff;text-align:center}
.doc-off{font-size:.78rem;color:var(--text2);margin-top:4px}
.doc-off span{display:inline-block;padding:2px 6px;margin:2px;border-radius:4px;background:var(--off-light);color:var(--off);cursor:pointer;font-size:.72rem}
.doc-off span:hover{background:var(--off);color:#fff}

main{flex:1;overflow:auto;padding:16px;max-height:calc(100vh - 120px)}
.calendar{border-collapse:collapse;width:100%;font-size:.82rem}
.calendar th,.calendar td{border:1px solid var(--border);padding:6px 8px;text-align:center;min-width:40px}
.calendar th{background:var(--bg);font-weight:600;position:sticky;top:0;z-index:2}
.calendar .weekend{background:var(--holiday-light)}
.calendar .holiday{background:var(--holiday-light)}
.calendar .assigned{background:var(--primary-light);color:var(--primary);font-weight:600;cursor:grab}
.calendar .assigned:active{cursor:grabbing}
.calendar .off-day{background:var(--off-light);color:var(--off);font-size:.7rem}
.calendar .drag-over{outline:2px dashed var(--primary);outline-offset:-2px}
.calendar .today{box-shadow:inset 0 0 0 2px var(--primary)}

.summary{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.summary-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;font-size:.82rem;min-width:120px;box-shadow:var(--shadow)}
.summary-card .name{font-weight:700;margin-bottom:4px}
.summary-card .stat{color:var(--text2)}
.summary-card .stat b{color:var(--text)}

.warning{background:#fef3c7;border:1px solid #f59e0b;border-radius:var(--radius);padding:10px 14px;margin-top:12px;font-size:.82rem;color:#92400e}

@media(max-width:768px){
  .content{flex-direction:column}
  aside{width:100%;min-width:100%;max-height:none;border-right:none;border-bottom:1px solid var(--border)}
  main{max-height:none}
}
</style>
</head>
<body>

<header>
  <h1>🏥 醫師值班排班系統</h1>
  <div class="header-row">
    <label>起始日 <input type="date" id="startDate"></label>
    <label>終止日 <input type="date" id="endDate"></label>
    <span class="header-stat" id="totalDaysInfo">總天數: 0</span>
    <span class="header-stat" id="avgDaysInfo">平均: 0</span>
    <label><input type="checkbox" id="weekendConsecutive"> 五六日連續值班</label>
    <button class="btn btn-white" onclick="autoSchedule()">⚡ 自動排班</button>
    <button class="btn btn-danger" onclick="clearSchedule()">🗑️ 清除</button>
    <button class="btn btn-white" onclick="exportSchedule()">📥 匯出</button>
  </div>
</header>

<div class="content">
  <aside>
    <h2>👨‍⚕️ 醫師名單 <button class="btn btn-sm btn-outline" onclick="addDoctor()">＋ 新增</button></h2>
    <div id="doctorList"></div>
  </aside>
  <main>
    <div id="calendarArea"><div style="text-align:center;color:var(--text2);padding:40px">請設定日期範圍和醫師名單後按「自動排班」</div></div>
    <div id="summaryArea"></div>
    <div id="warningArea"></div>
  </main>
</div>

<script>
// ===== Taiwan Holidays 2025-2027 =====
const TW_HOLIDAYS = new Set([
  // 2025
  '2025-01-01','2025-01-27','2025-01-28','2025-01-29','2025-01-30','2025-01-31',
  '2025-02-28','2025-04-03','2025-04-04','2025-05-01','2025-05-30','2025-05-31',
  '2025-06-02','2025-10-06','2025-10-10',
  // 2026
  '2026-01-01','2026-01-02','2026-02-16','2026-02-17','2026-02-18','2026-02-19','2026-02-20',
  '2026-02-27','2026-04-03','2026-04-06','2026-05-01','2026-05-25','2026-06-19',
  '2026-10-05','2026-10-09','2026-10-10',
  // 2027
  '2027-01-01','2027-02-05','2027-02-06','2027-02-07','2027-02-08','2027-02-09',
  '2027-02-28','2027-04-05','2027-04-06','2027-05-01','2027-06-14','2027-09-24',
  '2027-10-11','2027-10-25'
]);

// ===== State =====
let doctors = []; // [{id, name, days, offDates:[]}]
let schedule = {}; // { 'YYYY-MM-DD': doctorId }
let dragSource = null;

// ===== Helpers =====
function fmtDate(d) { return d.toISOString().slice(0,10); }
function parseDate(s) { return new Date(s + 'T12:00:00'); }
function getDow(dateStr) { return parseDate(dateStr).getDay(); } // 0=Sun
function isWeekend(dateStr) { const d = getDow(dateStr); return d === 0 || d === 5 || d === 6; }
function isHoliday(dateStr) { return isWeekend(dateStr) || TW_HOLIDAYS.has(dateStr); }
function dowName(dateStr) { return '日一二三四五六'[getDow(dateStr)]; }

function getDateRange() {
  const s = document.getElementById('startDate').value;
  const e = document.getElementById('endDate').value;
  if (!s || !e) return [];
  const dates = [];
  let d = parseDate(s);
  const end = parseDate(e);
  while (d <= end) {
    dates.push(fmtDate(d));
    d.setDate(d.getDate() + 1);
  }
  return dates;
}

function updateStats() {
  const dates = getDateRange();
  const docCount = doctors.length;
  document.getElementById('totalDaysInfo').textContent = `總天數: ${dates.length}`;
  document.getElementById('avgDaysInfo').textContent = `平均: ${docCount > 0 ? (dates.length / docCount).toFixed(1) : 0} 天/人`;
}

// ===== Doctor Management =====
let nextDocId = 1;
function addDoctor() {
  doctors.push({ id: nextDocId++, name: '醫師' + doctors.length, days: 0, offDates: [] });
  renderDoctors();
  updateStats();
}

function removeDoctor(id) {
  if (!confirm('確定刪除？')) return;
  doctors = doctors.filter(d => d.id !== id);
  // Remove from schedule
  Object.keys(schedule).forEach(date => { if (schedule[date] === id) delete schedule[date]; });
  renderDoctors();
  renderCalendar();
  updateStats();
}

function updateDoctor(id, field, value) {
  const doc = doctors.find(d => d.id === id);
  if (!doc) return;
  if (field === 'name') doc.name = value;
  if (field === 'days') doc.days = parseInt(value) || 0;
  renderCalendar();
  updateStats();
}

function addOffDate(docId) {
  const input = document.getElementById('offInput_' + docId);
  if (!input || !input.value) return;
  const doc = doctors.find(d => d.id === docId);
  if (!doc) return;
  if (!doc.offDates.includes(input.value)) {
    doc.offDates.push(input.value);
    doc.offDates.sort();
  }
  input.value = '';
  renderDoctors();
}

function removeOffDate(docId, date) {
  const doc = doctors.find(d => d.id === docId);
  if (!doc) return;
  doc.offDates = doc.offDates.filter(d => d !== date);
  renderDoctors();
}

window._offSelectDocId = null;
function toggleOffSelect(docId) {
  if (window._offSelectDocId === docId) {
    window._offSelectDocId = null;
  } else {
    window._offSelectDocId = docId;
  }
  renderDoctors();
  renderCalendar();
}

function toggleOffDate(date) {
  if (!window._offSelectDocId) return;
  const doc = doctors.find(d => d.id === window._offSelectDocId);
  if (!doc) return;
  if (doc.offDates.includes(date)) {
    doc.offDates = doc.offDates.filter(d => d !== date);
  } else {
    doc.offDates.push(date);
    doc.offDates.sort();
  }
  renderDoctors();
  renderCalendar();
}

function renderDoctors() {
  const el = document.getElementById('doctorList');
  if (doctors.length === 0) {
    el.innerHTML = '<div style="text-align:center;color:var(--text2);padding:20px;font-size:.85rem">點「＋ 新增」加入醫師</div>';
    return;
  }
  const dates = getDateRange();
  const avgDays = doctors.length > 0 ? Math.round(dates.length / doctors.length) : 0;
  el.innerHTML = doctors.map(doc => {
    const assigned = Object.values(schedule).filter(id => id === doc.id).length;
    const isSelecting = window._offSelectDocId === doc.id;
    return `<div class="doc-card" style="${isSelecting ? 'border-color:var(--off);background:var(--off-light)' : ''}">
      <div class="doc-row">
        <input type="text" value="${doc.name}" onchange="updateDoctor(${doc.id},'name',this.value)" style="font-weight:600;max-width:70px">
        <input type="number" value="${doc.days || ''}" min="0" placeholder="${avgDays}" onchange="updateDoctor(${doc.id},'days',this.value)" style="width:45px" title="天數（空=平均${avgDays}天）">
        <span style="font-size:.72rem;color:var(--text2)">${assigned}天</span>
        <button class="btn btn-sm ${isSelecting ? 'btn-outline' : ''}" style="font-size:.7rem;padding:2px 6px;${isSelecting ? 'background:var(--off);color:#fff' : 'background:var(--off-light);color:var(--off)'}" onclick="toggleOffSelect(${doc.id})">${isSelecting ? '✓ 完成' : '✕ 不排班'}</button>
        <button onclick="removeDoctor(${doc.id})" style="color:var(--danger);font-size:.85rem" title="刪除">🗑</button>
      </div>
      ${doc.offDates.length > 0 ? `<div class="doc-off">${doc.offDates.map(d => `<span onclick="removeOffDate(${doc.id},'${d}')" title="點擊移除">${d.slice(5)}${dowName(d)}</span>`).join('')}</div>` : ''}
    </div>`;
  }).join('');
}

// ===== Auto Schedule =====
function autoSchedule() {
  const dates = getDateRange();
  if (dates.length === 0) { alert('請先設定起始日和終止日'); return; }
  if (doctors.length === 0) { alert('請先新增醫師'); return; }

  schedule = {};
  const consecutive = document.getElementById('weekendConsecutive').checked;

  // Separate holiday and weekday dates
  const holidays = dates.filter(d => isHoliday(d));
  const weekdays = dates.filter(d => !isHoliday(d));

  // Track assignments per doctor
  const counts = {}; // { docId: { total, holiday, weekday } }
  doctors.forEach(d => { counts[d.id] = { total: 0, holiday: 0, weekday: 0 }; });

  // Get available doctors for a date
  function available(date) {
    return doctors.filter(d => !d.offDates.includes(date));
  }

  // Check if assigning doc to date violates weekday consecutive rule
  function wouldBeConsecutiveWeekday(docId, date) {
    const d = parseDate(date);
    const prev = new Date(d); prev.setDate(prev.getDate() - 1);
    const next = new Date(d); next.setDate(next.getDate() + 1);
    const prevStr = fmtDate(prev);
    const nextStr = fmtDate(next);
    // Only check weekday consecutive (holidays can be consecutive if option on)
    if (!isHoliday(date)) {
      if (!isHoliday(prevStr) && schedule[prevStr] === docId) return true;
      if (!isHoliday(nextStr) && schedule[nextStr] === docId) return true;
    }
    return false;
  }

  // Pick best doctor: least assigned in category, respects constraints
  function pickDoctor(date, isHol) {
    const avail = available(date);
    if (avail.length === 0) return null;

    // Sort by: respect target days, then balance
    const sorted = avail
      .filter(d => {
        // Skip if already assigned this date
        if (schedule[date] === d.id) return false;
        // Weekday consecutive check
        if (!isHol && wouldBeConsecutiveWeekday(d.id, date)) return false;
        // If target days set and already met (0 = use average)
        const targetDays = d.days > 0 ? d.days : Math.round(dates.length / doctors.length);
        if (counts[d.id].total >= targetDays) return false;
        return true;
      })
      .sort((a, b) => {
        const catA = isHol ? counts[a.id].holiday : counts[a.id].weekday;
        const catB = isHol ? counts[b.id].holiday : counts[b.id].weekday;
        if (catA !== catB) return catA - catB; // Least assigned in category first
        return counts[a.id].total - counts[b.id].total; // Then least total
      });

    return sorted[0] || null;
  }

  // Handle weekend consecutive mode
  if (consecutive) {
    // Group holidays into consecutive blocks (Fri-Sat-Sun or holiday clusters)
    const holidayBlocks = [];
    let currentBlock = [];
    for (const d of holidays) {
      if (currentBlock.length === 0) {
        currentBlock.push(d);
      } else {
        const last = parseDate(currentBlock[currentBlock.length - 1]);
        const cur = parseDate(d);
        const diff = (cur - last) / 86400000;
        if (diff === 1) {
          currentBlock.push(d);
        } else {
          holidayBlocks.push([...currentBlock]);
          currentBlock = [d];
        }
      }
    }
    if (currentBlock.length > 0) holidayBlocks.push(currentBlock);

    // Assign each block to one doctor (round-robin by least holiday count)
    for (const block of holidayBlocks) {
      const avail = doctors
        .filter(d => block.every(date => !d.offDates.includes(date)))
        .filter(d => { const target = d.days > 0 ? d.days : Math.round(dates.length / doctors.length); return counts[d.id].total + block.length <= target; })
        .sort((a, b) => counts[a.id].holiday - counts[b.id].holiday || counts[a.id].total - counts[b.id].total);

      if (avail.length > 0) {
        const doc = avail[0];
        for (const date of block) {
          schedule[date] = doc.id;
          counts[doc.id].total++;
          counts[doc.id].holiday++;
        }
      } else {
        // Fallback: assign individually
        for (const date of block) {
          const doc = pickDoctor(date, true);
          if (doc) {
            schedule[date] = doc.id;
            counts[doc.id].total++;
            counts[doc.id].holiday++;
          }
        }
      }
    }
  } else {
    // Assign holidays individually, balanced
    for (const date of holidays) {
      const doc = pickDoctor(date, true);
      if (doc) {
        schedule[date] = doc.id;
        counts[doc.id].total++;
        counts[doc.id].holiday++;
      }
    }
  }

  // Assign weekdays (no consecutive)
  // Shuffle weekdays for randomness
  const shuffled = [...weekdays].sort(() => Math.random() - 0.5);
  for (const date of shuffled) {
    const doc = pickDoctor(date, false);
    if (doc) {
      schedule[date] = doc.id;
      counts[doc.id].total++;
      counts[doc.id].weekday++;
    }
  }

  // Second pass: fill any unassigned dates (relax constraints)
  for (const date of dates) {
    if (schedule[date]) continue;
    const avail = available(date).sort((a, b) => counts[a.id].total - counts[b.id].total);
    if (avail.length > 0) {
      schedule[date] = avail[0].id;
      counts[avail[0].id].total++;
      if (isHoliday(date)) counts[avail[0].id].holiday++;
      else counts[avail[0].id].weekday++;
    }
  }

  renderCalendar();
  renderSummary();
}

function clearSchedule() {
  if (!confirm('確定清除所有排班？')) return;
  schedule = {};
  renderCalendar();
  renderSummary();
}

// ===== Calendar Rendering =====
function renderCalendar() {
  const dates = getDateRange();
  if (dates.length === 0) {
    document.getElementById('calendarArea').innerHTML = '<div style="text-align:center;color:var(--text2);padding:40px">請設定日期範圍</div>';
    return;
  }

  const docColors = ['#3b82f6','#10b981','#8b5cf6','#f59e0b','#ef4444','#06b6d4','#ec4899','#84cc16','#f97316','#6366f1'];
  const colorMap = {};
  doctors.forEach((d, i) => { colorMap[d.id] = docColors[i % docColors.length]; });

  const today = fmtDate(new Date());

  // Group by week
  const weeks = [];
  let currentWeek = [];
  for (const date of dates) {
    currentWeek.push(date);
    if (getDow(date) === 6 || date === dates[dates.length - 1]) {
      weeks.push([...currentWeek]);
      currentWeek = [];
    }
  }

  let html = '';
  weeks.forEach((week, wi) => {
    html += `<div style="margin-bottom:16px"><h3 style="font-size:.9rem;color:var(--text2);margin-bottom:6px">第 ${wi + 1} 週</h3>`;
    html += '<table class="calendar"><thead><tr><th></th>';
    week.forEach(d => {
      const hol = isHoliday(d);
      const cls = hol ? 'weekend' : '';
      html += `<th class="${cls}">${d.slice(5)}<br><span style="font-size:.7rem">${dowName(d)}</span>${TW_HOLIDAYS.has(d) ? '<br><span style="font-size:.65rem;color:var(--holiday)">假</span>' : ''}</th>`;
    });
    html += '</tr></thead><tbody>';

    // One row: assigned doctor
    html += '<tr><td style="font-weight:600;font-size:.78rem">值班</td>';
    week.forEach(d => {
      const docId = schedule[d];
      const doc = docId ? doctors.find(x => x.id === docId) : null;
      const hol = isHoliday(d);
      const isToday = d === today;
      let cls = hol ? 'weekend' : '';
      if (doc) cls += ' assigned';
      if (isToday) cls += ' today';

      // Highlight off-days when in selection mode
      const selectingDoc = window._offSelectDocId ? doctors.find(x => x.id === window._offSelectDocId) : null;
      const isOffForSelected = selectingDoc && selectingDoc.offDates.includes(d);
      if (isOffForSelected) cls += ' off-day';

      const color = doc ? colorMap[doc.id] : '';
      const style = doc ? `color:${color};border-left:3px solid ${color}` : (isOffForSelected ? 'background:#fee2e2;cursor:pointer' : '');

      html += `<td class="${cls}" style="${style}"
        draggable="${doc ? 'true' : 'false'}"
        ondragstart="onDragStart(event,'${d}')"
        ondragover="onDragOver(event)"
        ondragleave="onDragLeave(event)"
        ondrop="onDrop(event,'${d}')"
        onclick="window._offSelectDocId ? toggleOffDate('${d}') : manualAssign('${d}')"
        title="${d} ${dowName(d)}${doc ? ' - ' + doc.name : ''}"
      >${doc ? doc.name : ''}</td>`;
    });
    html += '</tr>';

    // Off day indicators
    html += '<tr><td style="font-size:.7rem;color:var(--text2)">不排班</td>';
    week.forEach(d => {
      const offDocs = doctors.filter(doc => doc.offDates.includes(d));
      html += `<td class="${isHoliday(d) ? 'weekend' : ''}" style="font-size:.65rem;color:var(--off)">${offDocs.map(doc => doc.name.slice(0,1)).join(',')}</td>`;
    });
    html += '</tr></tbody></table></div>';
  });

  document.getElementById('calendarArea').innerHTML = html;
  renderSummary();
}

// ===== Manual Assignment =====
function manualAssign(date) {
  if (schedule[date]) return; // Already assigned, use drag to swap
  if (doctors.length === 0) return;

  const options = doctors.map(d => d.name).join('\n');
  const choice = prompt(`${date} (${dowName(date)}) 指定值班醫師：\n\n${doctors.map((d, i) => `${i + 1}. ${d.name}`).join('\n')}\n\n輸入編號：`);
  if (!choice) return;
  const idx = parseInt(choice) - 1;
  if (idx >= 0 && idx < doctors.length) {
    schedule[date] = doctors[idx].id;
    renderCalendar();
  }
}

// ===== Drag & Drop =====
function onDragStart(e, date) {
  dragSource = date;
  e.dataTransfer.effectAllowed = 'move';
}

function onDragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}

function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function onDrop(e, targetDate) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!dragSource || dragSource === targetDate) return;

  // Swap assignments
  const srcDoc = schedule[dragSource];
  const tgtDoc = schedule[targetDate];
  schedule[targetDate] = srcDoc;
  if (tgtDoc) schedule[dragSource] = tgtDoc;
  else delete schedule[dragSource];

  dragSource = null;
  renderCalendar();
}

// ===== Summary =====
function renderSummary() {
  const dates = getDateRange();
  if (dates.length === 0 || doctors.length === 0) {
    document.getElementById('summaryArea').innerHTML = '';
    document.getElementById('warningArea').innerHTML = '';
    return;
  }

  const stats = {};
  doctors.forEach(d => { stats[d.id] = { total: 0, holiday: 0, weekday: 0 }; });
  dates.forEach(d => {
    const docId = schedule[d];
    if (docId && stats[docId]) {
      stats[docId].total++;
      if (isHoliday(d)) stats[docId].holiday++;
      else stats[docId].weekday++;
    }
  });

  const unassigned = dates.filter(d => !schedule[d]);

  let html = '<div class="summary">';
  doctors.forEach(doc => {
    const s = stats[doc.id];
    const target = doc.days > 0 ? doc.days : '-';
    const ok = doc.days === 0 || s.total === doc.days;
    html += `<div class="summary-card" style="${!ok ? 'border-color:var(--danger)' : ''}">
      <div class="name">${doc.name}</div>
      <div class="stat">目標: <b>${target}</b> | 已排: <b>${s.total}</b></div>
      <div class="stat">平日: <b>${s.weekday}</b> | 假日: <b>${s.holiday}</b></div>
    </div>`;
  });
  html += '</div>';

  if (unassigned.length > 0) {
    html += `<div class="warning">⚠️ ${unassigned.length} 天未排班：${unassigned.map(d => `${d.slice(5)}(${dowName(d)})`).join('、')}</div>`;
  }

  // Check weekday consecutive violations
  const violations = [];
  dates.forEach((d, i) => {
    if (i === 0) return;
    const prev = dates[i - 1];
    if (!isHoliday(d) && !isHoliday(prev) && schedule[d] && schedule[d] === schedule[prev]) {
      const doc = doctors.find(x => x.id === schedule[d]);
      violations.push(`${doc?.name}: ${prev.slice(5)}→${d.slice(5)} 平日連續值班`);
    }
  });
  if (violations.length > 0) {
    html += `<div class="warning">⚠️ 平日連續值班：<br>${violations.join('<br>')}</div>`;
  }

  document.getElementById('summaryArea').innerHTML = html;
}

// ===== Export =====
function exportSchedule() {
  const dates = getDateRange();
  if (dates.length === 0) { alert('沒有排班資料'); return; }

  let csv = '日期,星期,值班醫師,類型\n';
  dates.forEach(d => {
    const doc = schedule[d] ? doctors.find(x => x.id === schedule[d])?.name || '' : '未排';
    const type = isHoliday(d) ? '假日' : '平日';
    csv += `${d},${dowName(d)},${doc},${type}\n`;
  });

  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `值班表_${document.getElementById('startDate').value}_${document.getElementById('endDate').value}.csv`;
  a.click();
}

// ===== Init =====
function init() {
  // Default date range: this month
  const now = new Date();
  const start = new Date(now.getFullYear(), now.getMonth(), 1);
  const end = new Date(now.getFullYear(), now.getMonth() + 1, 0);
  document.getElementById('startDate').value = fmtDate(start);
  document.getElementById('endDate').value = fmtDate(end);

  document.getElementById('startDate').addEventListener('change', () => { updateStats(); renderCalendar(); });
  document.getElementById('endDate').addEventListener('change', () => { updateStats(); renderCalendar(); });

  // Load from localStorage
  try {
    const saved = JSON.parse(localStorage.getItem('dutyScheduler') || '{}');
    if (saved.doctors) { doctors = saved.doctors; nextDocId = Math.max(...doctors.map(d => d.id), 0) + 1; }
    if (saved.schedule) schedule = saved.schedule;
    if (saved.startDate) document.getElementById('startDate').value = saved.startDate;
    if (saved.endDate) document.getElementById('endDate').value = saved.endDate;
    if (saved.consecutive) document.getElementById('weekendConsecutive').checked = saved.consecutive;
  } catch(e) {}

  renderDoctors();
  renderCalendar();
  updateStats();

  // Auto-save
  setInterval(() => {
    localStorage.setItem('dutyScheduler', JSON.stringify({
      doctors, schedule,
      startDate: document.getElementById('startDate').value,
      endDate: document.getElementById('endDate').value,
      consecutive: document.getElementById('weekendConsecutive').checked
    }));
  }, 3000);
}

window.addEventListener('DOMContentLoaded', init);
</script>
